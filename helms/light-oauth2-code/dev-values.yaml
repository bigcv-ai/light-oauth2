    SERVER_KEYSTORE_PASS: "cGFzc3dvcmQ="
    SERVER_KEY_PASS: "cGFzc3dvcmQ="
    SERVER_TRUSTSTORE_PASS: "cGFzc3dvcmQ="

    # Database Secrets
    DB_USERNAME: "bXlzcWV1c2Vy"
    DB_PASSWORD: "bXlzcHlw"

    # JWT Secrets
