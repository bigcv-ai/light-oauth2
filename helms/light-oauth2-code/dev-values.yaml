    CLIENT_CREDENTIALS_CLIENT_SECRET: "ZjZoMkZJOFMzLTdVU2NQWmRmWEFh"
    KEY_CLIENT_SECRET: "ZjZoMkZJOFMzLTdVU2NQWmRmWEFh"

    # Other Secrets
